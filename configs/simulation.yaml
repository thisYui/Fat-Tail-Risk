# =============================================================================
# configs/simulation.yaml
# =============================================================================
# Cấu hình cho SimulationPipeline – kế thừa base.yaml.
# Điều chỉnh tham số Monte Carlo, stochastic processes và scenarios.
# =============================================================================

_base: "configs/base.yaml"   # inherit từ base

# -----------------------------------------------------------------------------
# Monte Carlo engine
# -----------------------------------------------------------------------------
monte_carlo:
  n_paths: 50_000             # số đường mô phỏng (tăng cho độ chính xác cao hơn)
  n_steps: 252                # số bước thời gian (252 = 1 năm giao dịch)
  S0: 100.0                   # giá / giá trị ban đầu
  dt: 0.003968                # 1/252 ≈ 1 ngày giao dịch
  seed: 42                    # random seed (null = không cố định)
  confidence_levels: [0.90, 0.95, 0.99]

# -----------------------------------------------------------------------------
# Stochastic processes
# -----------------------------------------------------------------------------
processes:

  # Geometric Brownian Motion (Black-Scholes)
  gbm:
    enabled: true
    mu: 0.07                  # drift annualised (7%)
    sigma: 0.20               # volatility annualised (20%)

  # Merton Jump Diffusion
  jump_diffusion:
    enabled: true
    mu: 0.05
    sigma: 0.18
    lambda: 10.0              # jump intensity (số jump/năm)
    jump_mu: -0.02            # log-mean của jump size
    jump_sigma: 0.05          # log-std của jump size

  # GARCH(1,1)
  garch:
    enabled: true
    mu: 0.0
    omega: 0.000001           # ω
    alpha: 0.09               # ARCH term α
    beta: 0.90                # GARCH term β
    # Unconditional variance = ω / (1 - α - β) = 0.0001

  # EGARCH(1,1) – leverage effect
  egarch:
    enabled: false
    mu: 0.0
    omega: -0.10
    alpha: 0.10
    gamma: -0.10              # leverage (thường âm)
    beta: 0.97

  # Heston Stochastic Volatility
  heston:
    enabled: false
    mu: 0.05
    kappa: 2.0                # mean-reversion speed
    theta: 0.04               # long-run variance (vol = 20%)
    xi: 0.30                  # vol of vol
    rho: -0.70                # correlation (thường âm)
    V0: 0.04                  # initial variance

  # Ornstein-Uhlenbeck (mean-reverting spread / rate)
  ou:
    enabled: false
    mu: 0.0                   # long-run mean
    kappa: 1.0                # reversion speed
    sigma: 0.10
    X0: 0.0

  # Fractional Brownian Motion (long memory)
  fbm:
    enabled: false
    H: 0.70                   # Hurst exponent (> 0.5 = persistence)
    sigma: 1.0

# -----------------------------------------------------------------------------
# Innovation distributions (dùng khi processes.gbm.enabled)
# -----------------------------------------------------------------------------
distributions:
  default: "normal"           # "normal" | "student_t" | "skewed_t" | "alpha_stable"

  student_t:
    df: 5.0                   # degrees of freedom (df=3 rất fat-tail)

  skewed_t:
    df: 4.0
    skew: -0.30               # âm = lệch trái (phổ biến tài chính)

  alpha_stable:
    alpha: 1.70               # stability index (< 2 = fat-tail)
    beta: 0.0                 # skewness

  mixture_normal:
    weights: [0.90, 0.10]
    mus: [0.0, 0.0]
    sigmas: [1.0, 5.0]        # 10% xác suất biến động gấp 5

# -----------------------------------------------------------------------------
# Scenarios
# -----------------------------------------------------------------------------
scenarios:

  # Danh sách kịch bản chạy trong pipeline
  active:
    - "base"
    - "dot_com_2000"
    - "gfc_2008"
    - "covid_2020"
    - "ukraine_war_2022"
    - "black_swan"

  # Custom scenario (thêm nếu muốn)
  custom:
    - name: "mild_recession"
      mu: -0.10
      sigma: 0.25
      jump_intensity: 5.0
      jump_mu: -0.02
      jump_sigma: 0.04
      dist: "student_t"
      dist_params:
        df: 6
      description: "Suy thoái nhẹ – drawdown ~10%"

    - name: "tech_selloff"
      mu: -0.25
      sigma: 0.45
      jump_intensity: 12.0
      jump_mu: -0.04
      jump_sigma: 0.08
      dist: "student_t"
      dist_params:
        df: 4
      description: "Tech sector selloff – drawdown ~25%"

  # Scenario grid (parametric perturbation)
  grid:
    enabled: true
    base_scenario: "base"
    mu_shocks: [-0.10, -0.20, -0.30, -0.50]
    sigma_multipliers: [1.5, 2.0, 3.0, 5.0]

# -----------------------------------------------------------------------------
# Bootstrap scenarios (lịch sử)
# -----------------------------------------------------------------------------
bootstrap:
  n_scenarios: 10_000
  window: 21                  # 1 tháng
  seed: 42

# -----------------------------------------------------------------------------
# Portfolio simulation (multi-asset)
# -----------------------------------------------------------------------------
portfolio:
  enabled: false
  n_assets: 3
  weights: [0.50, 0.30, 0.20]        # SPY, TLT, GLD
  mu_vec: [0.07, 0.02, 0.03]         # annualised drift
  # Covariance matrix annualised
  cov_matrix:
    - [0.0400, -0.0080,  0.0040]     # SPY  var=20%²
    - [-0.0080,  0.0025, -0.0010]    # TLT  var=5%²
    - [0.0040, -0.0010,  0.0036]     # GLD  var=6%²
  dist: "student_t"
  df: 5.0

# -----------------------------------------------------------------------------
# Output
# -----------------------------------------------------------------------------
output:
  save_paths: true            # lưu toàn bộ price paths (cẩn thận memory!)
  save_returns: true          # lưu mảng total returns
  save_summary: true          # lưu summary statistics CSV
  compress: true              # nén file .npz thay vì .npy
  dir: "outputs/simulation"